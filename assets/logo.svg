<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%" aria-label="Guidory Premium Identity Logo">
  <defs>
    <linearGradient id="luxuryGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2C974" />
      <stop offset="50%" stop-color="#C8A45D" />
      <stop offset="100%" stop-color="#9A7020" />
    </linearGradient>
  </defs>
  
  <g transform="translate(60, 20)">
    <!-- Instrument Dial Frame -->
    <circle cx="100" cy="100" r="76" fill="none" stroke="url(#luxuryGold)" stroke-width="1.2" opacity="0.8"/>
    <line x1="40" y1="100" x2="160" y2="100" stroke="url(#luxuryGold)" stroke-width="0.8" opacity="0.4" stroke-dasharray="1 4"/>
    <line x1="100" y1="40" x2="100" y2="160" stroke="url(#luxuryGold)" stroke-width="0.8" opacity="0.4" stroke-dasharray="1 4"/>
    
    <!-- Micro Coordinates -->
    <circle cx="100" cy="24" r="1.5" fill="url(#luxuryGold)"/>
    <circle cx="176" cy="100" r="1.5" fill="url(#luxuryGold)"/>
    <circle cx="100" cy="176" r="1.5" fill="url(#luxuryGold)"/>
    <circle cx="24" cy="100" r="1.5" fill="url(#luxuryGold)"/>
    
    <!-- North Star Spire Grid Architecture -->
    <path d="M100,35 L104,90 L100,100 L96,90 Z" fill="url(#luxuryGold)"/>
    <path d="M100,165 L104,110 L100,100 L96,110 Z" fill="url(#luxuryGold)" opacity="0.9"/>
    <path d="M165,100 L110,104 L100,100 L110,96 Z" fill="url(#luxuryGold)" opacity="0.95"/>
    <path d="M35,100 L90,104 L100,100 L90,96 Z" fill="url(#luxuryGold)" opacity="0.85"/>
    
    <!-- Micro Filament Networks -->
    <line x1="100" y1="100" x2="130" y2="70" stroke="url(#luxuryGold)" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="100" x2="70" y2="130" stroke="url(#luxuryGold)" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="100" x2="130" y2="130" stroke="url(#luxuryGold)" stroke-width="1" opacity="0.6"/>
    <line x1="100" y1="100" x2="70" y2="70" stroke="url(#luxuryGold)" stroke-width="1" opacity="0.6"/>
    
    <circle cx="100" cy="100" r="2" fill="url(#luxuryGold)"/>

    <!-- Structural Typography Elements -->
    <text x="230" y="105" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="52px" font-weight="300" letter-spacing="0.32em" fill="#FFFFFF">GUIDORY</text>
    <circle cx="695" cy="93" r="4.5" fill="url(#luxuryGold)"/>
    <text x="234" y="142" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="11px" font-weight="600" letter-spacing="0.58em" fill="#C8A45D">EXECUTIVE ADVISORY</text>
  </g>
